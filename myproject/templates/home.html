<!-- templates/home.html -->
{% extends "base.html" %}

{% block title %}Home Page{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="display-4">Welcome to AutoML</h1>
    {% comment %} <p class="lead">A responsive site built with Bootstrap and Django.</p> {% endcomment %}
    
    <hr class="my-4">

    <p class="lead">
        {% if user.is_authenticated %}
            <a class="btn btn-primary btn-lg" href="{% url 'logout' %}" role="button">Logout</a>
        {% else %}
            <a class="btn btn-primary btn-lg" href="{% url 'login' %}" role="button">Login</a>
            <a class="btn btn-secondary btn-lg" href="{% url 'register' %}" role="button">Register</a>
        {% endif %}
    </p>  
</div>
{% endblock %}
